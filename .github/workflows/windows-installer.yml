name: Construction et publication de l'installeur Windows

# Tourne sur un runner Windows (packaging/windows/installer/build.ps1 a besoin
# d'Inno Setup + d'un vrai node.exe à embarquer), et uniquement sur un tag de
# version — pousser un tag "vX.Y.Z" correspondant à la version de package.json
# déclenche une release. Publie Movviz-Setup-<version>.exe comme fichier joint
# à la Release GitHub, c'est ce que vérifie la mise à jour en un clic de l'app.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation d'Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Construction de l'installeur
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\installer\build.ps1

      - name: Extraction des notes de version depuis CHANGELOG.md
        run: node scripts/extract-changelog.mjs

      - name: Publication de la release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Movviz-Setup-*.exe
          body_path: dist/release-notes.md
