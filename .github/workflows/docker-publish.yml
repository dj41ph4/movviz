name: Publication de l'image Docker

# Construit packaging/docker/Dockerfile et la publie sur Docker Hub à chaque
# mise à jour de main - l'image récupérée par le NAS reste synchronisée
# avec le dépôt automatiquement, sans étape manuelle.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configuration de QEMU pour multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Calcul des tags de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/movviz
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Construction et publication (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
